name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - ruby: "3.0"
            gemfile: gemfiles/rails71.gemfile
          - ruby: "3.1"
            gemfile: gemfiles/rails71.gemfile
          - ruby: "3.2"
            gemfile: gemfiles/rails71.gemfile
          - ruby: "3.3"
            gemfile: Gemfile
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1.292.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      - name: Check Chrome
        if: ${{ !env.ACT }}
        run: google-chrome --version

      - name: Run system tests
        if: ${{ !env.ACT }}
        run: bundle exec rake system_test

  security:
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: Gemfile

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1.292.0
        with:
          ruby-version: "3.0"
          bundler-cache: true

      - name: Brakeman static analysis
        run: bundle exec brakeman --no-pager -q -w 2 -i brakeman.ignore -x EOLRails

      - name: bundler-audit CVE check
        run: bundle exec bundler-audit check -u

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: npm audit
        run: npm audit --audit-level=high
