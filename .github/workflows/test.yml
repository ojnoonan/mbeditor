name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - gemfile: Gemfile
          - gemfile: gemfiles/rails71.gemfile
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1.292.0
        with:
          ruby-version: "3.0"
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      - name: Check Chrome
        run: google-chrome --version

      - name: Run system tests
        run: bundle exec rake system_test

  security:
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: Gemfile

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1.292.0
        with:
          ruby-version: "3.0"
          bundler-cache: true

      - name: Brakeman static analysis
        run: bundle exec brakeman --no-pager -q -w 2 -i brakeman.ignore -x EOLRails

      - name: bundler-audit CVE check
        run: |
          bundle exec bundler-audit update
          bundle exec bundler-audit check
