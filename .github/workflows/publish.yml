name: Publish Gem Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v0.1.0). Must match an existing tag.'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1.292.0
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      - name: Run system tests
        run: bundle exec rake system_test

      - name: Build gem
        run: bundle exec rake build

      - name: Push gem to RubyGems.org
        run: gem push pkg/mbeditor-*.gem --key github_oidc

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: pkg/mbeditor-*.gem
          generate_release_notes: true
